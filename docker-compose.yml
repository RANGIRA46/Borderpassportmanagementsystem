version: "3.8"

services:
  frontend:
    build:
      context: .
      target: runtime
    ports:
      - "3000:3000"
    environment:
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:54321/functions/v1/server}
      - VITE_APP_ENV=development
    volumes:
      # Mount source for hot-reload during development builds
      - ./src:/app/src:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
