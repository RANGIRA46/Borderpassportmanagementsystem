name: Deploy to Production

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  test:
    name: Test & Build
    uses: ./.github/workflows/test.yml

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: test
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build (production)
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_APP_ENV: production
        run: npm run build

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Function to Production
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy server \
            --project-ref ${{ secrets.SUPABASE_PROJECT_ID }} \
            --no-verify-jwt

      - name: Set Edge Function secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase secrets set \
            SUPABASE_SERVICE_ROLE_KEY="${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            CORS_ORIGIN="${{ secrets.CORS_ORIGIN }}" \
            --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}

      - name: Production health check
        run: |
          curl --fail --retry 5 --retry-delay 10 \
            "${{ secrets.VITE_API_BASE_URL }}/health" \
            || (echo "Production health check failed — manual rollback may be required" && exit 1)

      - name: Create GitHub release notes
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
